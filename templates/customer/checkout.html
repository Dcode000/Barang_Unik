<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout | Barang Unik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans" x-data="checkoutSystem()">

    <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-3xl mx-auto px-4 flex h-14 items-center">
            <a href="/" class="p-2 -ml-2 text-gray-600 hover:text-slate-900">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <span class="font-bold text-lg px-4">Pengiriman & Pembayaran</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 pb-24">
        
        <div x-show="cart.length === 0" class="text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
            <i data-lucide="shopping-cart" class="w-16 h-16 mx-auto text-gray-300 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Keranjang Lu Kosong Bre!</h2>
            <p class="text-gray-500 mb-6">Pilih barang uniknya dulu gih.</p>
            <a href="/" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">Balik Belanja</a>
        </div>

        <div x-show="cart.length > 0" class="space-y-6">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <h3 class="font-bold text-lg mb-4 border-b pb-2">Barang Bawaan Lu</h3>
                <ul class="space-y-4">
                    <template x-for="item in cart" :key="item.id">
                        <li class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="bg-yellow-100 text-yellow-800 font-bold px-2 py-1 rounded text-xs" x-text="item.qty + 'x'"></span>
                                <span class="text-sm font-medium text-gray-800" x-text="item.name"></span>
                            </div>
                            <span class="font-bold text-sm" x-text="'Rp ' + formatRupiah(item.price * item.qty)"></span>
                        </li>
                    </template>
                </ul>
                <div class="mt-4 pt-4 border-t flex justify-between items-center text-lg font-black text-slate-900">
                    <span>Total Barang:</span>
                    <span x-text="'Rp ' + formatRupiah(cartTotal)"></span>
                </div>
            </div>

            <form @submit.prevent="processOrder" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-4">
                <h3 class="font-bold text-lg mb-2">Data Pengiriman</h3>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" x-model="customer.name" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Contoh: Budi Santoso">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nomor WhatsApp</label>
                    <input type="tel" x-model="customer.whatsapp" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="081234567890">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Alamat Lengkap</label>
                    <textarea x-model="customer.address" required rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Nama Jalan, RT/RW, Kelurahan, Kecamatan, Kota, Kode Pos..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Metode Pembayaran</label>
                    <select x-model="customer.payment" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm font-bold text-slate-700">
                        <option value="Transfer BCA">Transfer Bank (BCA)</option>
                        <option value="Transfer Mandiri">Transfer Bank (Mandiri)</option>
                        <option value="COD">Bayar di Tempat (COD)</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-yellow-500 hover:text-slate-900 text-white font-black py-4 rounded-xl transition-colors text-lg mt-4 flex justify-center items-center disabled:opacity-50" :disabled="isLoading">
                    <span x-show="!isLoading">Pesan Sekarang &rarr;</span>
                    <span x-show="isLoading" class="animate-pulse">Memproses...</span>
                </button>
            </form>

        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('checkoutSystem', () => ({
                cart: [],
                isLoading: false,
                customer: {
                    name: '',
                    whatsapp: '',
                    address: '',
                    payment: 'Transfer BCA'
                },

                init() {
                    const savedCart = localStorage.getItem('unik_cart');
                    if (savedCart) this.cart = JSON.parse(savedCart);
                },

                get cartTotal() {
                    return this.cart.reduce((total, item) => total + (item.price * item.qty), 0);
                },

                formatRupiah(number) {
                    return new Intl.NumberFormat('id-ID').format(number);
                },

                async processOrder() {
                    this.isLoading = true;
                    
                    const payload = {
                        customer: this.customer,
                        items: this.cart,
                        total_amount: this.cartTotal
                    };

                    try {
                        // Nembak ke Endpoint Checkout di main.py nanti
                        const response = await fetch('/api/checkout', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            alert(`Pesanan berhasil! Nomor Pesanan lu: ${result.order_number}`);
                            localStorage.removeItem('unik_cart'); // Kosongin keranjang
                            window.location.href = '/'; // Balik ke depan
                        } else {
                            alert('Gagal buat pesanan: ' + result.message);
                        }
                    } catch (error) {
                        alert('Server lagi sibuk bre, coba lagi ntar.');
                    } finally {
                        this.isLoading = false;
                    }
                }
            }))
        });
        lucide.createIcons();
    </script>
</body>
</html>
