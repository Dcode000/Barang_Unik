<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk / Daftar | Barang Unik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-slate-800 min-h-screen flex flex-col" x-data="{ isLogin: true }">

    <nav class="bg-white border-b border-gray-200 z-40 shadow-sm">
        <div class="max-w-md mx-auto px-4 flex h-14 items-center">
            <a href="/" class="p-2 -ml-2 text-gray-600 hover:text-slate-900">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <span class="font-bold text-lg px-4 flex-1 text-center pr-10">Akun Pelanggan</span>
        </div>
    </nav>

    <main class="flex-1 max-w-md w-full mx-auto p-6 flex flex-col justify-center">
        
        <div class="flex items-center justify-center gap-2 mb-8">
            <i data-lucide="sparkles" class="w-8 h-8 text-yellow-500"></i>
            <span class="font-black text-2xl tracking-tight">BARANG<span class="text-yellow-500">UNIK</span></span>
        </div>

        <div class="bg-gray-200 p-1 rounded-xl flex mb-8">
            <button @click="isLogin = true" :class="isLogin ? 'bg-white shadow text-slate-900' : 'text-gray-500 hover:text-gray-700'" class="flex-1 py-2 font-bold rounded-lg transition-all text-sm">Masuk</button>
            <button @click="isLogin = false" :class="!isLogin ? 'bg-white shadow text-slate-900' : 'text-gray-500 hover:text-gray-700'" class="flex-1 py-2 font-bold rounded-lg transition-all text-sm">Daftar Baru</button>
        </div>

        <form x-show="isLogin" action="/auth/login" method="POST" class="space-y-4" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Contoh: bos@unik.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Masukkan sandi lu">
            </div>
            <button type="submit" class="w-full bg-slate-900 hover:bg-yellow-500 hover:text-slate-900 text-white font-black py-4 rounded-xl transition-colors text-base mt-2 flex justify-center items-center shadow-lg hover:shadow-yellow-500/30">
                Masuk Sekarang &rarr;
            </button>
        </form>

        <form x-show="!isLogin" action="/auth/register" method="POST" class="space-y-4" style="display: none;" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nama Lengkap</label>
                <input type="text" name="full_name" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Sesuai KTP bre">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nomor WhatsApp</label>
                <input type="tel" name="whatsapp" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="081234567890">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Email aktif lu">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Bikin Password</label>
                <input type="password" name="password" required class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm" placeholder="Minimal 6 karakter ya">
            </div>
            <button type="submit" class="w-full bg-yellow-500 hover:bg-slate-900 text-slate-900 hover:text-white font-black py-4 rounded-xl transition-colors text-base mt-2 flex justify-center items-center shadow-lg">
                <i data-lucide="user-plus" class="w-5 h-5 mr-2"></i> Buat Akun!
            </button>
        </form>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
