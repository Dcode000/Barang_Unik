<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ produk.name }} | Barang Unik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans text-slate-800 pb-24" x-data="cartSystem()">

    <nav class="fixed top-0 w-full bg-white border-b border-gray-200 z-40 shadow-sm">
        <div class="max-w-md mx-auto px-4 flex justify-between h-14 items-center">
            <a href="/" class="p-2 -ml-2 text-gray-600 hover:text-slate-900">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <span class="font-bold text-lg truncate px-4">{{ produk.name }}</span>
            <button @click="goToCheckout()" class="relative p-2 -mr-2 text-gray-600">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                <span x-show="totalItems > 0" x-text="totalItems" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold text-white transform translate-x-1/4 -translate-y-1/4 bg-red-500 rounded-full"></span>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto pt-14 bg-white min-h-screen shadow-sm">
        <div class="w-full aspect-square bg-gray-100 relative">
            <img src="{{ produk.image_url or 'https://placehold.co/600' }}" alt="{{ produk.name }}" class="w-full h-full object-cover">
        </div>

        <div class="p-5">
            <div class="flex justify-between items-start mb-2">
                <h1 class="text-2xl font-black leading-tight">{{ produk.name }}</h1>
            </div>
            <p class="text-2xl font-black text-yellow-600 mb-4">Rp {{ "{:,.0f}".format(produk.price).replace(',', '.') }}</p>

            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-6">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="sparkles" class="w-5 h-5 text-yellow-500"></i>
                    <h3 class="font-bold text-yellow-800">Kenapa Barang Ini Unik?</h3>
                </div>
                <p class="text-sm text-yellow-700 font-medium">{{ produk.why_its_unique }}</p>
            </div>

            <div class="mb-6">
                <h3 class="font-bold text-lg mb-2">Deskripsi Produk</h3>
                <p class="text-gray-600 text-sm leading-relaxed whitespace-pre-line">{{ produk.description }}</p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 p-4 z-40">
        <div class="max-w-md mx-auto flex gap-3">
            <a href="/ai-assistant" class="w-14 h-12 flex items-center justify-center bg-gray-100 text-slate-700 rounded-xl hover:bg-gray-200 transition">
                <i data-lucide="message-circle" class="w-6 h-6"></i>
            </a>
            <button @click="addToCart({{ produk.id }}, '{{ produk.name }}', {{ produk.price }}, '{{ produk.image_url }}')" class="flex-1 bg-slate-900 hover:bg-yellow-500 hover:text-slate-900 text-white font-bold rounded-xl transition-colors flex justify-center items-center">
                <i data-lucide="plus" class="w-5 h-5 mr-2"></i> Tambah ke Keranjang
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('cartSystem', () => ({
                cart: [],
                init() {
                    const savedCart = localStorage.getItem('unik_cart');
                    if (savedCart) this.cart = JSON.parse(savedCart);
                },
                saveCart() { localStorage.setItem('unik_cart', JSON.stringify(this
