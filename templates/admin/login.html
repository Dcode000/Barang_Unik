<!DOCTYPE html>
<html lang="id">
<head>

    <title>Login Admin | Barang Unik</title>
    <script src="https://cdn.tailwindcss.com"></script>

            <div class="relative z-10">
                <div class="flex items-center justify-center gap-2 mb-2">
                    <i data-lucide="sparkles" class="w-8 h-8 text-yellow-400"></i>
                    <span class="text-3xl font-black tracking-wider text-white">BARANG<span class="text-yellow-400">UNIK</span></span>

        </div>

                <i data-lucide="alert-circle" class="w-5 h-5 mr-2 flex-shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

                            <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" name="username" required autofocus autocomplete="off"

                               placeholder="Masukkan username">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Password Rahasia</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>

                               placeholder="Masukkan password">
                    </div>
                </div>
